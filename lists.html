<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list in html</title>
</head>
<body>
    <h6>unorderd list:</h6>
     <!-- ul: unrdered list -->
    <!--type : disc (default), circle, square, none-->
    <ul type="none">
        <!--li: list item-->
        <li>english</li>
        <li>maths</li>
        <li>science</li>
    </ul>
    <!--ul>li*5--> 
    <ul>
        <li>a</li>
        <li>b</li>
    </ul>

    <h6>order list:</h6>
    <!-- ol: ordered list -->
     <!-- type : 1 (default), A, a, I, i --> 
      <ol start="8" type="I" reversed="true">
        <li>english</li>
        <li>maths</li>
        <li>science</li>
      </ol>
      <!--ol>li*5-->
      <ol>
        <li>a</li>
        <li>b</li>
        <li>c</li>
        <li>d</li>
        <li>e</li>
      </ol>

      <h6>description list:</h6>
        <!--dl: description list-->
    <dl>
        <!--dt: definition term-->
        <dt>html:</dt>
        <!--dd: definition description-->
        <dd>hyper text markup language</dd>

        <dt>css:</dt>
        <dd>cascading style sheet</dd>

        <dt>js:</dt>
        <dd>java script</dd>
    <dl
    </body>
</html>
