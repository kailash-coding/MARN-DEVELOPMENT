<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tables</title>
</head>
<body>
    <table border ="">
        <caption>
            its my table 
        </caption>
        
        <colgroup>
            <col span="2" style="background-color: rgb(73, 69, 62);"/>
            <col span="2" style="background-color: rgb(223, 155, 38);"/>l
        </colgroup>
        <!--tr: table row-->
        <thead>
        <tr>
            <!--th: table header-->
            <th>col-1</th>
            <th>col-2</th>
            <th>col-3</th>
            <th>col-4</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <!--td: table data-->
            <!--<td rowspan="3">1</td>-->
            <td colspan="2">1</td>
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td>4</td>
        </tr>
        <tr>
            <td>5</td>
            <td>6</td>
            <td>7</td>
            <td>8</td>
        </tr>
        <tr>
            <td>9</td>
            <td>10</td>
            <td>11</td>
            <td>12</td>
        </tr>
        </body>
        <tfoot> 
            <tr>
                <td>abc</td>
                <td>def</td>
                <td>ghi</td>
                <td>jkll</td>
            </tr>
            </tfoot>
        </body>
    </table>
</body>
</html>
